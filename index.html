<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fcfcfc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- default (not black-translucent): iOS lays the standalone web view out
         below the status bar and extends it to the physical screen bottom.
         With black-translucent the web view is anchored at the top but sized
         screen-minus-status-bar, so nothing can ever paint the bottom band. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Noto" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <title>Noto</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
