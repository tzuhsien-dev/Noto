name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and component tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: End-to-end tests (fake backend)
        run: npm run test:e2e

      - name: Production build
        run: npm run build

      - name: Assert no privileged credentials in the bundle
        run: |
          if grep -RiE "service_role|sb_secret_" dist/; then
            echo "::error::Privileged credential material found in build output"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
