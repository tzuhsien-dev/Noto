name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# The build needs VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY.
# Configure them as repository *variables* (Settings → Secrets and variables →
# Actions → Variables). They end up in the public JS bundle either way — the
# publishable key is designed to be public; the security boundary is
# Supabase Auth + RLS, never this workflow. The service_role key must NEVER
# appear here.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and component tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          # GitHub Pages serves this repo at /<repo-name>/.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Assert no privileged credentials in the bundle
        run: |
          if grep -RiE "service_role|sb_secret_" dist/; then
            echo "::error::Privileged credential material found in build output"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
